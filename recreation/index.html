
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recreation | Play & Explore</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@400;500;600&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Favicon -->
    <link rel="icon" href="https://bucket.mlcdn.com/a/3336/3336910/images/6f85b2de2f5fce38a8268533928751661b1f6a59.png">
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="sticky-wrapper">
        <header class="tags-header" id="tagsHeader">
            <div class="brand-logo">RECREATION <span>HUB</span></div>
            <button class="tag-btn active" data-target="gaming">Gaming</button>
            <button class="tag-btn" data-target="movies">Movies & Shows</button>
            <button class="tag-btn" data-target="news">News & Current Events</button>            
            <button class="tag-btn" data-target="music">Music & Audio</button>
            <button class="tag-btn" data-target="sports">Sports & Fitness</button>
            <button class="tag-btn" data-target="food">Food & Drink</button>
            <button class="tag-btn" data-target="travel">Travel & Exploration</button>        
        </header>

        <div class="progress-container">
            <div class="progress-stats">
                <span>Current Pillar Mastery</span>
                <span><strong id="progress-text-ui">0</strong> / <span id="total-text-ui">0</span> Modules Completed</span>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progress-fill-ui"></div>
            </div>
        </div>
    </div>

    <div class="main-container" id="content-container">
        <div style="text-align: center; color: var(--text-muted); padding: 50px;">
            <i class="fas fa-spinner fa-spin fa-2x"></i>
            <p style="margin-top:15px;">Loading Recreation Data...</p>
        </div>
    </div>

    <button id="backToTop" onclick="scrollToTop()">
        <i class="fas fa-chevron-up"></i>
    </button>

    <script src="script.js"></script>

    <script>
        /**
         * LIFE OS - IFRAME SYNC SCRIPT
         */
        window.addEventListener('DOMContentLoaded', () => {
            const pageContent = document.body.innerText.replace(/\s+/g, ' ').trim();
            const pageData = {
                type: 'REGISTER_SEARCH_INDEX',
                url: window.location.href,
                title: document.title || 'Recreation Hub',
                content: pageContent,
                pageType: 'Recreation Portal'
            };
            if (window.parent !== window) {
                window.parent.postMessage(pageData, '*');
                console.log("[Module] Synced content with Command Center.");
            }
        });
    </script>
    
</body>
</html>
